services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # DATABASE_URL from .env takes precedence (for external DB).
      # Falls back to the local `db` service below if not set.
      - DATABASE_URL=${DATABASE_URL:-postgres://armafield:${POSTGRES_PASSWORD:-armafield}@db:5432/armafield}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://${DOMAIN:-localhost}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - ARMAFIELD_TEST_MODE=${ARMAFIELD_TEST_MODE:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data/logs:/app/logs
      - ./data/backups:/app/data/backups
    depends_on:
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Local PostgreSQL — opt-in via profile.
  # Start with: `docker compose --profile local-db up`
  # Skip this (and set your own DATABASE_URL in .env) to use an external database.
  db:
    image: postgres:16-alpine
    profiles: ["local-db"]
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: armafield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-armafield}
      POSTGRES_DB: armafield
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armafield"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
